name: Deploy to GitHub Packages

# Snapshots: pushed automatically on every commit to main (current pom version,
# expected to be -SNAPSHOT — Maven routes by version suffix to snapshotRepository).
# Releases: workflow_dispatch with explicit releaseVersion + optional next snapshot bump.
#
# Required repo secrets:
#   GITHUB_TOKEN         — provided automatically; has packages:write on this repo only.
#   PACKAGES_READ_TOKEN  — PAT (classic) with read:packages scope; needed because the
#                          default GITHUB_TOKEN cannot read exeris-kernel snapshots
#                          from a different repository.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/claude*.yml'
      - '.github/agents/**'
      - '.github/skills/**'
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version to publish (e.g. 1.0.0). Leave empty to deploy current pom version as-is.'
        required: false
        type: string
      nextSnapshotVersion:
        description: 'Next development version (e.g. 1.1.0-SNAPSHOT). Leave empty to skip post-release bump-and-commit.'
        required: false
        type: string
      skipTests:
        description: 'Skip tests during deploy (use only for emergency re-publish).'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PACKAGES_READ_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
      MAVEN_OPTS: '-Xmx2g'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Verify settings token wiring
        run: |
          if [ -z "${PACKAGES_READ_TOKEN}" ]; then
            echo "::error::PACKAGES_READ_TOKEN secret is not set. Create a PAT (classic) with read:packages scope and add it as a repository secret."
            exit 1
          fi

      - name: Configure git identity (release only)
        if: github.event_name == 'workflow_dispatch' && inputs.releaseVersion != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        if: github.event_name == 'workflow_dispatch' && inputs.releaseVersion != ''
        run: >
          mvn -B -ntp -s .github/maven-settings.xml
          versions:set
          -DnewVersion=${{ inputs.releaseVersion }}
          -DgenerateBackupPoms=false
          -DprocessAllModules=true

      - name: Build, test, deploy
        run: >
          mvn -B -ntp -s .github/maven-settings.xml
          clean deploy
          -DskipTests=${{ inputs.skipTests || false }}

      - name: Tag release
        if: github.event_name == 'workflow_dispatch' && inputs.releaseVersion != ''
        run: |
          git tag -a "v${{ inputs.releaseVersion }}" -m "Release ${{ inputs.releaseVersion }}"
          git push origin "v${{ inputs.releaseVersion }}"

      - name: Bump to next snapshot
        if: github.event_name == 'workflow_dispatch' && inputs.releaseVersion != '' && inputs.nextSnapshotVersion != ''
        run: |
          mvn -B -ntp -s .github/maven-settings.xml versions:set \
            -DnewVersion=${{ inputs.nextSnapshotVersion }} \
            -DgenerateBackupPoms=false \
            -DprocessAllModules=true
          git add -A
          git commit -m "chore: bump to ${{ inputs.nextSnapshotVersion }} after ${{ inputs.releaseVersion }}"
          git push origin HEAD:${{ github.ref_name }}
